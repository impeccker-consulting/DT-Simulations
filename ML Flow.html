<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Impeccker Consulting — ML Pipeline Explorer v6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#04030f;font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden}

/* ═══ WRAPPER ═══════════════════════════════════════════════════ */
.W{background:linear-gradient(140deg,#07051a 0%,#110e38 55%,#0b1526 100%);
   border-radius:16px;overflow:hidden;color:#f1eeff;
   max-width:1140px;margin:14px auto;
   display:flex;flex-direction:column;
   box-shadow:0 0 80px rgba(168,120,252,.14),0 0 2px rgba(168,120,252,.4)}

/* ═══ HEADER ════════════════════════════════════════════════════ */
.H{display:flex;align-items:center;justify-content:space-between;
   padding:11px 20px 10px;border-bottom:2px solid rgba(168,120,252,.35);
   background:rgba(4,3,15,.92);flex-wrap:wrap;gap:10px;z-index:30;position:relative}

.LA{display:flex;align-items:center;gap:11px}
.BT b{color:#ede8ff;font-size:13.5px;font-weight:800;display:block;letter-spacing:.2px}
.BT span{color:#a78bfa;font-size:10px;letter-spacing:.4px}

/* TABS — always fully visible */
.TABS{display:flex;gap:7px}
.TB{padding:7px 17px;border-radius:22px;font-size:12px;font-weight:800;
    cursor:pointer;transition:all .22s;letter-spacing:.3px;border:2px solid transparent;
    white-space:nowrap}
.TB[data-t="cls"]{background:#3b0764;border-color:#9333ea;color:#e9d5ff}
.TB[data-t="cls"].act{background:#7c3aed;border-color:#d8b4fe;color:#fff;
    box-shadow:0 0 18px rgba(168,120,252,.6),inset 0 1px 0 rgba(255,255,255,.12)}
.TB[data-t="reg"]{background:#0c2740;border-color:#0284c7;color:#bae6fd}
.TB[data-t="reg"].act{background:#0369a1;border-color:#7dd3fc;color:#fff;
    box-shadow:0 0 18px rgba(56,189,248,.6),inset 0 1px 0 rgba(255,255,255,.12)}
.TB[data-t="clu"]{background:#052e16;border-color:#16a34a;color:#a7f3d0}
.TB[data-t="clu"].act{background:#065f46;border-color:#6ee7b7;color:#fff;
    box-shadow:0 0 18px rgba(52,211,153,.6),inset 0 1px 0 rgba(255,255,255,.12)}

/* SPEED CONTROLS — always visible */
.CTRLS{display:flex;align-items:center;gap:7px}
.CL{font-size:11px;font-weight:800;color:#c4b5fd;letter-spacing:.3px}
.SB{padding:5px 13px;border-radius:11px;font-size:11px;font-weight:800;
    cursor:pointer;transition:all .2s;
    background:#2d1b69;border:2px solid #6d28d9;color:#ddd6fe;letter-spacing:.3px}
.SB:hover{background:#3b1f82;border-color:#a78bfa}
.SB.on{background:#6d28d9;border-color:#c4b5fd;color:#fff;
    box-shadow:0 0 10px rgba(168,120,252,.5)}
.PB{width:33px;height:33px;border-radius:50%;cursor:pointer;
    border:2px solid #a78bfa;background:#4c1d95;color:#fff;
    font-size:14px;display:flex;align-items:center;justify-content:center;
    transition:all .2s;font-weight:800}
.PB:hover{background:#5b21b6;box-shadow:0 0 10px rgba(168,120,252,.4)}

/* ═══ STEP STRIP ════════════════════════════════════════════════ */
.STRIP{display:flex;align-items:center;gap:10px;padding:7px 20px;
       border-bottom:1px solid rgba(168,120,252,.2);
       background:rgba(109,40,217,.13);flex-wrap:wrap}
.SNUM{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
.STXT{font-size:12px;font-weight:800;color:#ede8ff}
.SSUB{font-size:10px;color:#a78bfa;font-style:italic}
.PROG{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden;min-width:80px}
.PROGF{height:100%;border-radius:2px;transition:width .6s ease}

/* ═══ BODY ══════════════════════════════════════════════════════ */
.BODY{display:flex;flex:1;min-height:530px}

/* LEFT */
.LP{width:160px;min-width:160px;border-right:1px solid rgba(168,120,252,.18);
    padding:10px 8px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.PT{font-size:9px;color:#a78bfa;text-transform:uppercase;letter-spacing:1.3px;
    font-weight:800;margin-bottom:5px;padding-left:3px}

.AG{padding:8px 9px;border-radius:8px;cursor:pointer;transition:all .22s;
    border:1.5px solid rgba(150,120,220,.25);background:rgba(109,40,217,.07)}
.AG:hover{background:rgba(109,40,217,.2);border-color:rgba(168,120,252,.5)}
.AG.on{background:rgba(109,40,217,.32);border-color:#a78bfa;
       box-shadow:0 0 8px rgba(168,120,252,.25)}
.AN{font-size:11px;color:#ede8ff;font-weight:800}
.AD{font-size:9px;color:#9d99c0;margin-top:1px}

/* SVG AREA */
.SA{flex:1;overflow:hidden;position:relative;background:rgba(4,3,15,.3)}
canvas#particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
#fsvg{display:block;width:100%;height:100%;position:relative;z-index:4}

/* RIGHT */
.RP{width:185px;min-width:185px;border-left:1px solid rgba(168,120,252,.18);
    padding:10px 8px;display:flex;flex-direction:column;gap:5px;overflow-y:auto}

.MC{padding:7px 9px;border-radius:7px;background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.12);margin-bottom:2px}
.ML{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px}
.MV{font-size:18px;font-weight:900;margin-top:2px;line-height:1}
.MB{height:5px;border-radius:3px;background:rgba(255,255,255,.1);margin-top:6px;overflow:hidden}
.MF{height:100%;border-radius:3px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}

.DC{padding:9px 10px;border-radius:8px;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.12);flex:1;overflow:hidden;margin-top:3px}
.DH{font-size:11px;font-weight:800;display:block;margin-bottom:5px}
.DF{white-space:pre;font-size:9px;color:#c8c4e8;line-height:1.75;
    font-family:'Courier New',monospace}

/* ═══ TOOLTIP ═══════════════════════════════════════════════════ */
.TT{position:fixed;background:rgba(15,12,40,.97);border:1px solid rgba(168,120,252,.4);
    border-radius:10px;padding:10px 13px;font-size:10px;color:#c8c4e8;
    line-height:1.6;max-width:220px;pointer-events:none;z-index:999;
    box-shadow:0 8px 32px rgba(0,0,0,.6);opacity:0;transition:opacity .18s;
    white-space:pre-line}
.TT.vis{opacity:1}
.TT b{color:#e9d5ff;font-weight:800;display:block;margin-bottom:4px;font-size:11px}

/* ═══ DOTS ═══════════════════════════════════════════════════════ */
.DR{display:flex;align-items:flex-start;gap:5px;
    padding:8px 18px 10px;border-top:1px solid rgba(168,120,252,.18);
    flex-wrap:wrap;background:rgba(4,3,15,.7)}
.DW{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.DOT{width:9px;height:9px;border-radius:50%;
     background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);
     transition:all .3s}
.DOT.dn{border:none}
.DOT.cu{transform:scale(1.55);border:none}
.DL{font-size:7px;color:#6b6890;max-width:36px;text-align:center;
    line-height:1.2;margin-top:1px;font-weight:600}

/* SVG animations */
@keyframes flowdash{to{stroke-dashoffset:-24}}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(.98)}}
@keyframes halo{0%,100%{stroke-opacity:.45}50%{stroke-opacity:.9}}
@keyframes particle{0%{r:3;opacity:.9}100%{r:0;opacity:0}}

.ad{stroke-dasharray:8 5;animation:flowdash 1.1s linear infinite}
.ap{animation:breathe 1.9s ease infinite}
.hl{animation:halo 1.4s ease infinite}
</style>
</head>
<body>

<div class="W" id="W">

  <!-- HEADER -->
  <div class="H">

      <svg width="44" height="40" viewBox="0 0 100 80" fill="none">
        <path d="M12 74 Q20 32 42 10" stroke="#7ab8d8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <div class="BODY">

    <div class="SA" id="svgwrap">
      <canvas id="particles"></canvas>
      <svg id="fsvg" viewBox="0 0 520 490"></svg>

    <div class="RP" id="rp"></div>
  </div>

  <div class="DR" id="dr"></div>
</div>

<!-- TOOLTIP -->
<div class="TT" id="tt"></div>

// ══ Canvas particle system ════════════════════════════════════════
var canvas=document.getElementById('particles');
var ctx=canvas.getContext('2d');
var ptx=[];

function resizeCanvas(){
  var wrap=document.getElementById('svgwrap');
  canvas.width=wrap.offsetWidth;
  canvas.height=wrap.offsetHeight;
}

function spawnParticles(){
  var d=DATA[tab]; var c=d.color;
  var N=getNodes();
  // spawn along active edge
  var cx_=function(n){return n.x+n.w/2;};
  var cy_=function(n){return n.y+n.h/2;};
  var svgW=520, svgH=490;
  var wrap=document.getElementById('svgwrap');
  var scaleX=wrap.offsetWidth/svgW;
  var scaleY=wrap.offsetHeight/svgH;

  if(step>0 && step<=10){
    var src=N[Math.min(step-1,10)];
    var dst=N[Math.min(step,10)];
    var sx=cx_(src)*scaleX, sy=(src.y+src.h/2)*scaleY;
    var dx=cx_(dst)*scaleX, dy=(dst.y+dst.h/2)*scaleY;
    for(var i=0;i<3;i++){
      ptx.push({
        x:sx,y:sy,tx:dx,ty:dy,
        prog:Math.random()*0.3,
        speed:0.004+Math.random()*0.006,
        r:3+Math.random()*2,
        col:c,life:1
      });
    }
  }
}

function animParticles(){
  resizeCanvas();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(var i=ptx.length-1;i>=0;i--){
    var p=ptx[i];
    p.prog+=p.speed;
    if(p.prog>=1){ptx.splice(i,1);continue;}
    var x=p.x+(p.tx-p.x)*p.prog;
    var y=p.y+(p.ty-p.y)*p.prog;
    var alpha=p.prog<0.2?p.prog/0.2:p.prog>0.8?(1-p.prog)/0.2:1;
    ctx.beginPath();
    ctx.arc(x,y,p.r*(1-p.prog*0.5),0,Math.PI*2);
    // parse hex color
    var hex=p.col.replace('#','');
    var r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    ctx.fillStyle='rgba('+r+','+g+','+b+','+alpha+')';
    // glow
    ctx.shadowColor=p.col;
    ctx.shadowBlur=8;
    ctx.fill();
    ctx.shadowBlur=0;
  }
  // keep spawning while playing
  if(playing && Math.random()<0.15) spawnParticles();
  requestAnimationFrame(animParticles);
}
animParticles();

function sw(t){
  tab=t;algo=0;step=0;ptx=[];
  document.querySelectorAll('.TB').forEach(function(b){b.classList.remove('act');});
  document.querySelector('.TB[data-t="'+t+'"]').classList.add('act');
  renderAll();resetAnim();
}
function setSp(s,btn){
  speed=s;
  document.querySelectorAll('.SB').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  if(playing){stopA();startA();}
}
function togglePlay(){
  playing=!playing;
  document.getElementById('pb').textContent=playing?'⏸':'▶';
  if(playing) startA(); else stopA();
}
function stopA(){clearTimeout(timer);}
function startA(){
  stopA();
  timer=setTimeout(function(){
    if(!playing)return;
    step=(step+1)%STEPS.length;
    updateStep();startA();
  },Math.round(2100/speed));
}
function resetAnim(){stopA();step=0;updateStep();if(playing)startA();}
function pickAlgo(i){
  algo=i;
  var c=DATA[tab].color;
  document.querySelectorAll('.AG').forEach(function(el,j){
    el.classList.toggle('on',j===i);
    el.style.borderColor=j===i?c:'rgba(150,120,220,.25)';
  });
  renderRight();drawFlow();
}
function updateStep(){updateStrip();renderDots();renderRight();drawFlow();}

function updateStrip(){
  var d=DATA[tab],fl=d.flow[Math.min(step,d.flow.length-1)];
  var snum=document.getElementById('snum');
  snum.textContent=step+1;
  snum.style.background=STEP_COLORS[step]||'#6d28d9';
  document.getElementById('stxt').textContent=fl.t;
  document.getElementById('ssub').textContent=d.label+' · Step '+(step+1)+' of 11';
  var progf=document.getElementById('progf');
  progf.style.width=Math.round((step+1)/11*100)+'%';

}

    } else if(n.type==='hex'){
      var off=12;
      var pts2=''+( n.x+off)+','+n.y+' '+(n.x+n.w-off)+','+n.y+' '+(n.x+n.w)+','+fcy+' '+(n.x+n.w-off)+','+(n.y+n.h)+' '+(n.x+off)+','+(n.y+n.h)+' '+n.x+','+fcy;
      if(act) h+='<polygon points="'+(n.x+off-4)+','+(n.y-4)+' '+(n.x+n.w-off+4)+','+(n.y-4)+' '+(n.x+n.w+4)+','+fcy+' '+(n.x+n.w-off+4)+','+(n.y+n.h+4)+' '+(n.x+off-4)+','+(n.y+n.h+4)+' '+(n.x-4)+','+fcy+'" fill="'+n.col+'" opacity=".1" filter="url(#g4)"/>';
      h+='<polygon points="'+pts2+'" fill="'+n.col+'" opacity=".18" '+(act?fs:'')+'/>';
      h+='<polygon points="'+pts2+'" fill="none" stroke="'+n.col+'" stroke-width="1.5"/>';
    } else if(n.type==='pill'){
      if(act) h+='<rect x="'+(n.x-5)+'" y="'+(n.y-5)+'" width="'+(n.w+10)+'" height="'+(n.h+10)+'" rx="'+(n.h/2+5)+'" fill="'+n.col+'" opacity=".1" filter="url(#g4)"/>';
      h+='<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="'+(n.h/2)+'" fill="'+n.col+'" opacity=".2" '+(act?fs:'')+'/>';
      h+='<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="'+(n.h/2)+'" fill="none" stroke="'+n.col+'" stroke-width="1.6"/>';
    } else {
      if(act) h+='<rect x="'+(n.x-5)+'" y="'+(n.y-5)+'" width="'+(n.w+10)+'" height="'+(n.h+10)+'" rx="12" fill="'+n.col+'" opacity=".1" filter="url(#g4)"/>';
      h+='<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="8" fill="'+n.col+'" opacity=".13" '+(act?fs:'')+'/>';
      h+='<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="8" fill="none" stroke="'+n.col+'" stroke-width="'+(act?2.2:1.2)+'"/>';
    }

    // Active animated halo ring
    if(act){
      var rr=n.type==='pill'?n.h/2+6:12;
      h+='<rect x="'+(n.x-6)+'" y="'+(n.y-6)+'" width="'+(n.w+12)+'" height="'+(n.h+12)+'" rx="'+rr+'"'+
         ' fill="none" stroke="'+n.col+'" stroke-width=".8" stroke-dasharray="5 3" class="ad hl" opacity=".55"/>';
    }

    // Labels
    var lblY=n.sub?fcy-7:fcy;
    h+='<text x="'+fcx+'" y="'+lblY+'" text-anchor="middle" dominant-baseline="central"'+
       ' font-size="11.5" font-weight="800" fill="'+(act?'#ffffff':'#ede8ff')+'" opacity="'+(act?1:.93)+'">'+n.lbl+'</text>';
    if(n.sub) h+='<text x="'+fcx+'" y="'+(fcy+9.5)+'" text-anchor="middle" dominant-baseline="central"'+
       ' font-size="9" fill="'+n.col+'" opacity="'+(act?1:.76)+'">'+n.sub+'</text>';

    // Active step badge
    if(act){
      h+='<circle cx="'+(n.x+n.w)+'" cy="'+n.y+'" r="9" fill="'+n.col+'" stroke="rgba(0,0,0,.5)" stroke-width="1"/>';
      h+='<text x="'+(n.x+n.w)+'" y="'+n.y+'" text-anchor="middle" dominant-baseline="central"'+
         ' font-size="9" font-weight="900" fill="#000">'+(n.si+1)+'</text>';
    }
    // Done tick
    if(done){
      h+='<text x="'+(n.x+n.w-4)+'" y="'+(n.y+4)+'" text-anchor="middle" dominant-baseline="central" font-size="10" opacity=".7">✓</text>';
    }
    h+='</g>';
  });

  // Step counter badge
  var bg=STEP_COLORS[step]||'#6d28d9';
  h+='<rect x="475" y="6" width="38" height="28" rx="14" fill="'+bg+'" opacity=".9"/>';
  h+='<text x="494" y="20" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="900" fill="white">'+(step+1)+'/11</text>';

  svg.innerHTML=h;
}

function renderAll(){renderLeft();renderRight();renderDots();updateStrip();drawFlow();}
renderAll();
startA();
window.addEventListener('resize',function(){resizeCanvas();});
</script>
